<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins">    
    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />

    <title>Join Our Newsletter | devChallenges.io</title>

    <!--You are welcome to delete these styles or modify them in your own stylesheet -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Poppins;
        height: 100vh;
        background-color: #F9FAFB;
      }

      main {
        text-align: center;
        padding: 24px;
      }

      .title {
        font-size: 3rem;
        font-weight: 600;
        color: #000000;
        margin-bottom: 24px;
      }

      .subheading {
        font-size: 1.25rem;
        font-weight: 400;
        color: #6C727F;
        margin-bottom: 48px;
      }

      .form {
        display: flex;
        flex-direction: column;
        box-shadow: 0px 20px 30px 0px rgba(0, 0, 0, 0.03), 0px 8px 12px 0px rgba(0, 0, 0, 0.08);
        padding: 24px;
        border-radius: 20px;
        gap: 24px;
        max-width: 590px;
        margin: 0 auto;
        background-color: white;
      }

      .email-field {
        border-color: #E5E7EB;
        background-color: #F9FAFB;
        border-radius: 12px;
        border-style: solid;
        border-width: 1.5px;
        text-align: center;
        font-size: 1rem;
        font-weight: 500;
        padding: 12px;
      }

      .email-field::placeholder {
        color: #394150;
        font-weight: 500;
      }

      .submit-button {
        font-size: 1rem;
        font-weight: 600;
        background-color: #284BCE;
        color: #FFFFFF;
        border-radius: 12px;
        border-style: none;
        padding: 12px;
      }

      .helper-text {
        font-size: 0.875rem;
        font-weight: 400;
        color: #394150;
        text-align: start;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="resources/logo.svg" alt="Company logo" class="logo"/>
      <h1 class="title">Join our newsletter</h1> 
      <p class="subheading">
        Keep up with our latest collections, exclusive deals, and special offers! <br>
        We introduce a new collection every week, so stay tuned to snag the hottest items just for you.
      </p>
      <form aria-label="Subscription form" class="form">
        <input 
          type="email" 
          aria-label="Email address for the newsletter" 
          aria-describedby="form_disclaimer"
          placeholder="Enter your email address" 
          class="email-field" />
        <button type="submit" class="submit-button">Subscribe now</button>
        <small id="form_disclaimer" class="helper-text">Your email is 100% confidential and won’t send you any spam.</small>
      </form>
    </main>
  </body>
</html>
