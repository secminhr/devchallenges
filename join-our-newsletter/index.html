<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />

    <title>Join Our Newsletter | devChallenges.io</title>

    <!--You are welcome to delete these styles or modify them in your own stylesheet -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
      }

      .author-info {
        font-size: 14px;
        text-align: center;
        margin-top: 16px;
        color: rgb(55, 65, 81);
      }

      .author-info a {
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="resources/logo.svg" alt="Company logo" />
      <h1>Join our newsletter</h1> 
      <p>Keep up with our latest collections, exclusive deals, and special offers! We introduce a new collection every week, so stay tuned to snag the hottest items just for you.</p>
      <form aria-label="Subscription form">
        <input 
          type="email" 
          aria-label="Email address for the newsletter" 
          aria-describedby="form_disclaimer"
          placeholder="Enter your email address" />
        <button type="submit">Subscribe now</button>
        <small id="form_disclaimer">Your email is 100% confidential and won’t send you any spam.</small>
      </form>
    </main>
  </body>
</html>
