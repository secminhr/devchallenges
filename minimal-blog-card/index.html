<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sora">    
    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />
    <link rel="stylesheet" href="card_style.css" />

    <title>devChallenges.io | Minimal Blog Card</title>

    <!--You are welcome to delete these styles or modify them in your own stylesheet -->
    <style> 
      body {
        font-family: Sora;
        height: 100vh;
      }

      article {
        margin: 164px auto;
      }

      .author-info {
        font-size: 14px;
        text-align: center;
        margin-top: 16px;
        color: rgb(55, 65, 81);
      }

      .author-info a {
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <article class="blog-card">
      <img  class="blog-card__img" 
            src="resources/Cactus.jpg" 
            alt="The image associated with the current blog" 
            srcset="
              resources/Cactus.jpg 1x,
              resources/Cactus@2x.jpg 2x
            "/>
      <span class="blog-card__tag">Design</span>
      <h1 class="blog-card__title">Embracing Minimalism</h1>
      <p class="blog-card__description">From minimalist sculptures to minimalist paintings, this blog will inspire you to appreciate the beauty that lies in simplicity.</p>
      <footer class="blog-card__footer">
        <span class="blog-card__author">Annie Spratt</span>
      </footer>
    </article>

    <div class="author-info">
      Coded by <a href="https://github.com/secminhr">secminhr</a> | Challenge by
      <a href="https://www.devchallenges.io?ref=challenge" target="_blank"
        >devChallenges.io</a
      >.
    </div>
  </body>
</html>
